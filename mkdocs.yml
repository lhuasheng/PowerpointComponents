site_name: PowerPoint Components
site_description: Composable Python primitives for building modern PowerPoint decks
site_url: https://lhuasheng.github.io/powerpointComponents/
repo_url: https://github.com/lhuasheng/powerpointComponents
repo_name: powerpointComponents

theme:
  name: material
  logo: readme_assets/hero_snapshot.png
  favicon: readme_assets/hero_snapshot.png
  palette:
    - scheme: default
      primary: blue
      accent: teal
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
            show_signature: true
            show_signature_annotations: true
            separate_signature: true
            heading_level: 2

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight

extra_css:
  - stylesheets/extra.css

nav:
  - Home:
      - Overview: index.md
      - Visual Gallery: components/visual_gallery.md
  - Components:
      - Overview: components/README.md
      - Text Box: components/text_box.md
      - Chart: components/chart.md
      - Module Catalog:
          - Index: components/modules/index.md
          - annotation.py: components/modules/annotation.md
          - callout.py: components/modules/callout.md
          - chart.py: components/modules/chart.md
          - chart_utils.py: components/modules/chart_utils.md
          - code_block.py: components/modules/code_block.md
          - comparison.py: components/modules/comparison.md
          - divider.py: components/modules/divider.md
          - grouped_table.py: components/modules/grouped_table.md
          - heatmap.py: components/modules/heatmap.md
          - image.py: components/modules/image.md
          - kpi_grid.py: components/modules/kpi_grid.md
          - legend.py: components/modules/legend.md
          - list.py: components/modules/list.md
          - metric.py: components/modules/metric.md
          - narrative.py: components/modules/narrative.md
          - navigation.py: components/modules/navigation.md
          - progress.py: components/modules/progress.md
          - range_indicator.py: components/modules/range_indicator.md
          - scatter.py: components/modules/scatter.md
          - table.py: components/modules/table.md
          - text_card.py: components/modules/text_card.md
          - timeline.py: components/modules/timeline.md
          - title.py: components/modules/title.md
          - waterfall.py: components/modules/waterfall.md
  - Guides:
      - Components Guide: components/guide.md
      - Component Reference: components/REFERENCE.md
      - Composition Patterns: components/PATTERNS.md
